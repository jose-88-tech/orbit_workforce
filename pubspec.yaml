name: orbit_workforce
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite_sqlcipher: ^3.0.0
  path: ^1.9.1
  lucide_icons_flutter: ^3.1.14+2
  shared_preferences: ^2.5.3
  image_picker: ^1.2.1
  connectivity_plus: ^7.1.1
  geolocator: ^14.0.2
  mobile_scanner: ^7.2.0
  uuid: ^4.5.1
  local_auth: ^2.3.0
  supabase_flutter: ^2.6.0
  flutter_secure_storage: ^9.2.2
  flutter_prevent_screenshot: ^0.0.1+16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
